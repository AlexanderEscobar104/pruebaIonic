name: Build IPA (iOS)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npx ng build --configuration production

      - name: Verify Capacitor CLI
        run: |
          ls node_modules/.bin/cap 2>/dev/null || echo "cap not found"
          ls node_modules/@capacitor/cli/package.json 2>/dev/null || echo "cli not installed"
          npm ls @capacitor/cli 2>/dev/null

      - name: Sync Capacitor iOS
        run: npx @capacitor/cli sync ios --deployment
        env:
          CI: true

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App

      - name: Build archive (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGN_ALLOWENTITLEMENT_MISMATCH=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" || echo "Archive failed - continuing"

      - name: Build for simulator (fallback)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO || echo "Simulator build failed"

      - name: Export IPA (if archive succeeded)
        run: |
          if [ -d "ios/App/App.xcarchive" ]; then
            cd ios/App
            xcodebuild -exportArchive \
                       -archivePath App.xcarchive \
                       -exportOptionsPlist ExportOptions.plist \
                       -exportPath ./output \
                       CODE_SIGNING_ALLOWED=NO || echo "Export needs signing cert"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-ios
          path: |
            ios/App/output/*.ipa
            ios/App/build/**/Build/**/*.app
          if-no-files-found: warn
