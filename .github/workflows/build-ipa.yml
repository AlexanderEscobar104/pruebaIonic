name: Build IPA (iOS)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g @capacitor/cli@latest
          npm install --legacy-peer-deps
        env:
          CI: true

      - name: Build web app
        run: npx ng build --configuration production

      - name: Sync Capacitor iOS (fix workspace)
        run: |
          cap sync ios
          echo "=== Checking xcworkspace ==="
          find ios -name "*.xcworkspace" -type d 2>/dev/null || echo "No xcworkspace found"
        env:
          CI: true

      - name: Fix missing workspace if needed
        run: |
          if ! find ios -name "*.xcworkspace" -type d | grep -q .; then
            echo "Workspace missing - regenerating iOS project..."
            rm -rf ios
            echo '{}' > capacitor.config.json
            cap init TodoApp io.ionic.todoapp --web-dir www
            rm capacitor.config.json
            cap add ios
          else
            echo "Workspace exists, continuing..."
          fi
        env:
          CI: true

      - name: List iOS project structure
        run: |
          echo "=== Workspaces ==="
          find ios -name "*.xcworkspace" -type d
          echo "=== Projects ==="
          find ios -name "*.xcodeproj" -type d

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
                     -workspace App.xcworkspace \
                     -scheme App

      - name: Build archive (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" || echo "Archive done (unsigned)"

      - name: Build for simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO || true

      - name: Export IPA (requires signing)
        run: |
          if [ -d "ios/App/App.xcarchive" ]; then
            cd ios/App
            xcodebuild -exportArchive \
                       -archivePath App.xcarchive \
                       -exportOptionsPlist ExportOptions.plist \
                       -exportPath ./output \
                       CODE_SIGNING_ALLOWED=NO || echo "IPA export needs signing cert"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-ios
          path: |
            ios/App/output/*.ipa
            ios/App/build/**/Build/**/*.app
          if-no-files-found: warn
