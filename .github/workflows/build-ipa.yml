name: Build IPA (iOS)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g @capacitor/cli@latest
          npm install --legacy-peer-deps
        env:
          CI: true

      - name: Build web app
        run: npx ng build --configuration production

      - name: Regenerate iOS project for macOS
        run: |
          rm -rf ios
          mv capacitor.config.ts capacitor.config.ts.bak
          echo '{"appId":"io.ionic.todoapp","appName":"TodoApp","webDir":"www"}' > capacitor.config.json
          cap init TodoApp io.ionic.todoapp --web-dir www
          rm capacitor.config.json
          mv capacitor.config.ts.bak capacitor.config.ts
          cap add ios
        env:
          CI: true

      - name: List iOS project structure
        run: |
          find ios -name "*.xcworkspace" -type d
          ls -la ios/App/

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
                     -workspace App.xcworkspace \
                     -scheme App || \
          xcodebuild -resolvePackageDependencies \
                     -project App.xcodeproj \
                     -scheme App

      - name: Build archive (unsigned)
        run: |
          cd ios/App
          WS="App.xcworkspace"
          if [ ! -d "$WS" ]; then WS="App.xcodeproj"; PRJ_FLAG="-project"; else PRJ_FLAG="-workspace"; fi
          xcodebuild $PRJ_FLAG "$WS" \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" || echo "Archive done (unsigned)"

      - name: Build for simulator
        run: |
          cd ios/App
          WS="App.xcworkspace"
          if [ ! -d "$WS" ]; then WS="App.xcodeproj"; PRJ_FLAG="-project"; else PRJ_FLAG="-workspace"; fi
          xcodebuild $PRJ_FLAG "$WS" \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-ios
          path: |
            ios/App/output/*.ipa
            ios/App/build/**/Build/**/*.app
          if-no-files-found: warn
