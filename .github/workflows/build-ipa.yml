name: Build IPA (iOS)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npx ng build --configuration production

      - name: Sync Capacitor iOS
        run: npx @capacitor/cli sync ios --deployment
        env:
          CI: true

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App

      - name: Build app (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER=""

      - name: Export IPA (unsigned - for development only)
        run: |
          cd ios/App
          xcodebuild -exportArchive \
                     -archivePath App.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath ./output \
                     CODE_SIGNING_ALLOWED=NO || echo "Export requires signing; see notes below"
          find output -name "*.ipa" 2>/dev/null | head -5 || echo "IPA not exported (no signing cert available)"

      - name: Build for simulator (unsigned .app)
        run: |
          cd ios/App
          rm -rf build
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO
          find build -name "*.app" -type d | head -3

      - name: Upload IPA (if generated)
        uses: actions/upload-artifact@v4
        with:
          name: todo-app.ipa
          path: ios/App/output/*.ipa
          if-no-files-found: warn

      - name: Upload simulator app (if no IPA)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-simulator.app
          path: ios/App/build/**/Build/**/*.app
          if-no-files-found: ignore
