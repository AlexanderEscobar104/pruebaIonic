<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" />
    </ion-buttons>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="section-hint" *ngIf="categories.length > 0">
    <p>Organiza tus tareas por categorías</p>
  </div>

  <ion-list>
    <ion-item *ngFor="let cat of categories" class="cat-card">
      <div class="cat-color-dot" [style.background]="cat.color" slot="start"></div>
      <ion-label class="cat-label">{{ cat.name }}</ion-label>
      <ion-button slot="end" fill="clear" class="action-btn" (click)="openEdit(cat)">
        <ion-icon name="create-outline" slot="icon-only" />
      </ion-button>
      <ion-button slot="end" fill="clear" class="action-btn delete-action" (click)="confirmDelete(cat.id)">
        <ion-icon name="trash-outline" slot="icon-only" />
      </ion-button>
    </ion-item>

    <div class="empty-state" *ngIf="categories.length === 0">
      <div class="empty-icon">
        <ion-icon name="list-outline" />
      </div>
      <h3>Sin categorías</h3>
      <p>Crea tu primera categoría</p>
    </div>
  </ion-list>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button (click)="openCreate()">
    <ion-icon name="add-outline" />
  </ion-fab-button>
</ion-fab>

<ion-modal [isOpen]="showModal" (didDismiss)="closeModal()" [breakpoints]="[0, 0.75, 1]" [initialBreakpoint]="0.75">
  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar>
        <ion-title>{{ editingCategory ? 'Editar' : 'Nueva' }} Categoría</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()">
            <ion-icon name="close-outline" slot="icon-only" />
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding modal-content">
      <div class="modal-field">
        <label class="field-label">Nombre</label>
        <ion-input
          [(ngModel)]="formName"
          placeholder="Ej: Personal, Trabajo..."
          class="modern-input"
        />
      </div>

      <div class="modal-field">
        <label class="field-label">Color</label>
        <div class="color-grid">
          <div
            *ngFor="let c of colorOptions"
            class="color-swatch"
            [style.background]="c"
            [class.selected]="formColor === c"
            (click)="formColor = c"
          >
            <ion-icon *ngIf="formColor === c" name="checkmark-outline" class="check-icon" />
          </div>
        </div>
      </div>
    </ion-content>
    <ion-footer class="ion-no-border">
      <div class="modal-footer">
        <ion-button expand="block" (click)="save()" [disabled]="!formName.trim()">
          {{ editingCategory ? 'Guardar cambios' : 'Crear categoría' }}
        </ion-button>
      </div>
    </ion-footer>
  </ng-template>
</ion-modal>

<ion-alert
  [isOpen]="showDeleteAlert"
  header="Eliminar categoría"
  message="¿Estás seguro? Las tareas con esta categoría quedarán sin categoría."
  [buttons]="alertButtons"
/>

<ion-toast
  [isOpen]="showSuccessToast"
  [message]="successMessage"
  [duration]="2000"
  color="success"
  position="bottom"
  (didDismiss)="showSuccessToast = false"
/>
